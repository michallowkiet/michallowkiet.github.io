<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap - RWD</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
      integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center m-3">
        <div class="col-md-4">
          <h5 class="text-center fw-normal border-bottom p-3 text-black-50">
            My skills
          </h5>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-6 col-md-4 text-center">
          <i class="fa-brands fa-html5 bg-light icon-html-css"></i>
          <p class="fw-light">HTML5</p>
        </div>
        <div class="col-sm-6 col-md-4 text-center">
          <i class="fa-brands fa-css3-alt bg-light icon-html-css"></i>
          <p class="fw-light">CSS3</p>
        </div>
        <div class="col-sm-6 col-md-4 text-center">
          <i class="fa-brands fa-js bg-light icon-js"></i>
          <p class="fw-light">JavaScript</p>
        </div>
        <div class="col-sm-6 col-md-4 text-center">
          <i class="fa-brands fa-react bg-light icon"></i>
          <p class="fw-light">ReactJS</p>
        </div>
        <div class="col-sm-6 col-md-4 text-center">
          <i class="fa-brands fa-git bg-light icon"></i>
          <p class="fw-light">GIT</p>
        </div>
        <div class="col-sm-6 col-md-4 text-center">
          <i class="fa-brands fa-wordpress bg-light icon"></i>
          <p class="fw-light">WordPress</p>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
