<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <nav class="navbar navbar-expand-md bg-transparent">
        <div class="container px-5">
          <a class="navbar-brand text-warning fs-6" href="#">New Age</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a
                  class="nav-link text-uppercase"
                  aria-current="page"
                  href="#download"
                  >Download</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link text-uppercase" href="#features">Features</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-uppercase" href="#contact">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <div class="container">
        <div class="row">
          <div class="col-md-6 p-5">
            <p class="h1 fw-normal">
              New Age is an app landing page that will help you beautifully
              showcase your new mobile app, or anything else!
            </p>
            <a
              href="#download"
              class="text-uppercase btn btn-outline-light rounded-pill mt-5 px-5 py-2"
              >Start now for free!</a
            >
          </div>
          <div class="col-md-6">
            <div class="img-box mx-auto">
              <img
                src="img/phone.png"
                alt="App demo screen"
                class="img-fluid"
              />
            </div>
          </div>
        </div>
      </div>
    </header>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
