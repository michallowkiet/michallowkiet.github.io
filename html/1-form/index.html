<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible"
        content="IE=edge">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>Formularz HTML 5</title>
</head>

<body>
  <form action="https://formspree.io/f/xzbwrqqp"
        method="POST">
    <label for="firstName">Imię:</label>
    <input type="text"
           name="firstName"
           id="firstName"> <br>

    <label for="lastName">Nazwisko:</label>
    <input type="text"
           name="lastName"
           id="lastName"> <br>

    <label for="email">Adres email:</label>
    <input type="email"
           name="email"
           id="email"> <br>

    <label for="city">Miasto:</label>
    <select name="city"
            id="city">
      <option value="krakow">Kraków</option>
      <option value="warszawa">Warszawa</option>
      <option value="gdansk">Gdańsk</option>
    </select>
    <br>

    <fieldset>
      <legend>Płeć</legend>
      <input type="radio"
             name="sex"
             id="female"
             value="kobieta">
      <label for="female">Kobieta</label> <br>

      <input type="radio"
             name="sex"
             id="male"
             value="mezczyzna">
      <label for="male">Mężczyzna</label> <br>
    </fieldset>

    <input type="checkbox"
           name="agreement"
           id="agreement">
    <label for="agreement">Zgoda na udostępnienie danych osobowych</label>
    <br />

    <label for="message">Wiadomość:</label><br>
    <textarea name="message"
              id="message"
              cols="50"
              rows="20"></textarea>
    <br>

    <button type="submit">Wyślij</button>
  </form>
</body>

</html>
